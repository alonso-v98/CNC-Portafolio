<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corretaje - CNC Propiedades</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="img/logo.png" alt="Logo CNC" class="logo-img">
        <nav><a href="index.html">← Volver al Inicio</a></nav>
        <h1>PROPIEDADES</h1>
    </header>

    <main>
        <div class="item">
            <div class="perfil-texto">
                <div style="margin-bottom: 10px;">
                    <span style="background: #155d27; color: #fff; padding: 5px 12px; border-radius: 2px; font-size: 0.7rem; text-transform: uppercase; font-weight: bold; letter-spacing: 1px;">Disponible</span>
                </div>
                
                <h2>Terreno en Villa Alemana</h2>
                
                <div class="propiedad-info" style="margin-bottom: 20px; border-left: 2px solid #d4af37; padding-left: 15px;">
                    <p><strong>Superficie total:</strong> 2.100 m²</p>
                    <p><strong>Precio:</strong> 250.000.000 CLP | 6.289 UF</p>
                </div>

                <div class="galeria-fotos" style="display: flex; gap: 10px; margin-bottom: 25px;">
                    <div class="foto-contenedor" style="width: 150px; height: 110px; cursor: pointer; border: 1px solid #333; overflow: hidden; border-radius: 2px;">
                        <img src="img/mapa.png" alt="Mapa del terreno" class="thumb" onclick="openModal(0)">
                    </div>
                    <div class="foto-contenedor" style="width: 150px; height: 110px; cursor: pointer; border: 1px solid #333; overflow: hidden; border-radius: 2px;">
                        <img src="img/esquina.png" alt="Vista de esquina" class="thumb" onclick="openModal(1)">
                    </div>
                    </div>

                <p style="margin-top: 20px; font-size: 0.9rem; color: #888; font-style: italic;">Para mayor información escribe a WhatsApp y/o correo. Estaremos felices de ayudarte.</p>
                
                <div style="display: flex; gap: 15px; margin-top: 25px; flex-wrap: wrap;">
                    <a href="https://wa.me/56982559972?text=Buen%20día.%20Me%20interesa%20el%20terreno%20de%202.100m2%20en%20Villa%20Alemana." target="_blank" class="contact-btn" style="flex: 1; min-width: 200px; margin: 0;">WhatsApp</a>
                    <a href="mailto:gmoraloper@gmail.com" class="contact-btn email-btn" style="flex: 1; min-width: 200px; margin: 0;">Enviar Correo</a>
                </div>
            </div>
        </div>
    </main>

    <div id="myModal" class="modal">
        <span class="close" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="imgFull">
        
        <a class="prev" onclick="changeImage(-1)">&#10094;</a>
        <a class="next" onclick="changeImage(1)">&#10095;</a>
    </div>

    <footer>
        <p>&copy; 2026 CNC Construcciones - Quilpué, Chile</p>
    </footer>

    <script>
        // Lista de imágenes de la galería (ASEGÚRATE QUE ESTÉN AQUÍ)
        const images = ["img/mapa.png", "img/esquina.png"];
        let currentImageIndex = 0;

        function openModal(index) {
            currentImageIndex = index;
            document.getElementById("myModal").style.display = "flex";
            updateModalImage();
        }

        function closeModal() {
            document.getElementById("myModal").style.display = "none";
        }

        function changeImage(direction) {
            currentImageIndex += direction;
            
            // Navegación cíclica
            if (currentImageIndex >= images.length) {
                currentImageIndex = 0;
            }
            if (currentImageIndex < 0) {
                currentImageIndex = images.length - 1;
            }
            
            updateModalImage();
        }

        function updateModalImage() {
            // Animación suave de cambio de imagen
            const modalImg = document.getElementById("imgFull");
            modalImg.style.opacity = 0;
            setTimeout(() => {
                modalImg.src = images[currentImageIndex];
                modalImg.style.opacity = 1;
            }, 100);
        }

        // Cerrar al hacer clic fuera de la imagen (en el fondo oscuro)
        window.onclick = function(event) {
            if (event.target === document.getElementById("myModal")) {
                closeModal();
            }
        }
    </script>
</body>
</html>
